name: Test Post_QE2PERT

on:
  push:
    branches: [ master]
  pull_request:
    branches: [ master ]

jobs:
  test-serial:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV
    
    - name: Run non-MPI tests
      run: |
        cd pyeph/post_qe2pert/test
        python -m pytest test_ph_disp.py::test_phonon_dispersion -v
    
  test-mpi:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install system dependencies (MPI only)
      run: |
        sudo apt-get update
        sudo apt-get install -y openmpi-bin openmpi-common libopenmpi-dev
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-mpi.txt
        
    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV
    
    - name: Test MPI installation
      run: |
        mpirun --version
        python -c "from mpi4py import MPI; print(f'MPI available, size: {MPI.COMM_WORLD.Get_size()}')"
    
    - name: Run MPI test with 4 processes
      run: |
        cd pyeph/post_qe2pert/test
        mpirun -n 4 python run.py